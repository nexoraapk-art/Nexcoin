name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./mobile
        run: npm install

      - name: Create Android project structure (if missing)
        working-directory: ./mobile
        run: |
          # اگر پوشه android وجود ندارد، یک قالب ساده ایجاد کن
          if [ ! -d "android" ]; then
            npx react-native init temp --version 0.73.2
            cp -r temp/android ./ && cp temp/gradlew* ./ && rm -rf temp
            chmod +x gradlew
          fi

      - name: Build APK
        working-directory: ./mobile
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexcoin-APK
          path: mobile/android/app/build/outputs/apk/release/*.apk
