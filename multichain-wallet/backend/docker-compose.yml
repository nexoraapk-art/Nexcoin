version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexcoin_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: walletdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexcoin_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/walletdb
      ADMIN_VAULT_MNEMONIC: abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about
      HMAC_SECRET: your-super-secret-random-32-byte-key-change-this
      JWT_SECRET: your-another-secret-key-for-jwt-change-this
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: npm start

volumes:
  postgres_data:

networks:
  default:
    name: nexcoin_network
